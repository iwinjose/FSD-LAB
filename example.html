<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student CRUD App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex flex-col items-center min-h-screen p-6">

    <h1 class="text-2xl font-bold mb-4 text-blue-700">🎓 Student Manager</h1>

    <div class="bg-white shadow-md rounded-lg p-6 w-full max-w-md mb-6">
        <form id="studentForm" class="flex flex-col gap-3">
            <input type="text" id="name" placeholder="Enter student name" class="border p-2 rounded">
            <input type="number" id="age" placeholder="Enter age" class="border p-2 rounded">
            <input type="text" id="course" placeholder="Enter course" class="border p-2 rounded">
            <button id="addBtn" class="bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Add Student</button>
        </form>
    </div>

    <div class="bg-white shadow-md rounded-lg p-4 w-full max-w-md">
        <h2 class="text-lg font-semibold mb-2">📋 Student List</h2>
        <ul id="studentList" class="divide-y divide-gray-200"></ul>
    </div>

    <script>
        // --- Data Structure ---
        let students = [];

        // --- References ---
        const nameInput = document.getElementById("name");
        const ageInput = document.getElementById("age");
        const courseInput = document.getElementById("course");
        const studentList = document.getElementById("studentList");
        const form = document.getElementById("studentForm");

        // --- CREATE & UPDATE ---
        form.addEventListener("submit", (e) => {
            e.preventDefault();
            const name = nameInput.value.trim();
            const age = ageInput.value.trim();
            const course = courseInput.value.trim();

            if (!name || !age || !course) {
                alert("Please fill all fields!");
                return;
            }

            const student = { id: Date.now(), name, age, course };
            students.push(student); // CREATE
            renderStudents(); // READ
            form.reset();
        });

        // --- READ ---
        function renderStudents() {
            studentList.innerHTML = "";
            students.forEach((student) => {
                const li = document.createElement("li");
                li.className = "p-2 flex justify-between items-center";
                li.innerHTML = `
          <div>
            <p class="font-semibold">${student.name}</p>
            <p class="text-sm text-gray-500">Age: ${student.age} | Course: ${student.course}</p>
          </div>
          <div class="flex gap-2">
            <button onclick="editStudent(${student.id})" class="bg-yellow-400 px-2 py-1 rounded text-white">✏️</button>
            <button onclick="deleteStudent(${student.id})" class="bg-red-500 px-2 py-1 rounded text-white">🗑️</button>
          </div>
        `;
                studentList.appendChild(li);
            });
        }

        // --- UPDATE ---
        function editStudent(id) {
            const student = students.find((s) => s.id === id);
            if (student) {
                nameInput.value = student.name;
                ageInput.value = student.age;
                courseInput.value = student.course;
                students = students.filter((s) => s.id !== id); // remove temporarily for update
            }
        }

        // --- DELETE ---
        function deleteStudent(id) {
            students = students.filter((s) => s.id !== id);
            renderStudents();
        }
    </script>

</body>

</html>
