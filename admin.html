<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turf Admin | CRUD Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        'primary-dark': '#047857',
                        accent: '#34d399',
                        surface: '#f8fafc',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-nav { @apply bg-white/80 backdrop-blur-md border-b border-white/20 shadow-sm; }
            .glass-card { @apply bg-white/70 backdrop-blur-lg border border-white/40 shadow-glass rounded-2xl; }
            .btn-primary { @apply bg-gradient-to-r from-primary to-primary-dark text-white px-6 py-2 rounded-xl font-heading font-semibold hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300; }
            .btn-danger { @apply bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-medium transition-all duration-300; }
            .btn-warning { @apply bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg font-medium transition-all duration-300; }
            .input-field { @apply w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all duration-300; }
        }
    </style>
</head>

<body class="font-sans text-slate-700 bg-slate-50 antialiased min-h-screen pt-24 pb-12">

    <header class="fixed w-full top-0 z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <nav class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <a href="index.html" class="flex items-center gap-2 group">
                        <span class="font-heading font-bold text-2xl text-slate-800 tracking-tight">Turf <span
                                class="text-primary">Admin</span></span>
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="font-medium text-slate-600 hover:text-primary transition-colors">
                        Back to Home
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 lg:px-8">

        <div class="text-center mb-10">
            <h1 class="font-heading text-4xl md:text-5xl font-bold text-slate-800 mb-4">Manage Turfs</h1>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">

            <div class="lg:col-span-1">
                <div class="glass-card p-6">
                    <h2 id="formTitle" class="font-heading text-2xl font-bold text-slate-800 mb-6">Add New Turf</h2>
                    <form id="turfForm" class="space-y-4">
                        <input type="hidden" id="turfId">

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Turf Name</label>
                            <input type="text" id="turfName" class="input-field" placeholder="e.g. Arena Prime"
                                required>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Location</label>
                            <input type="text" id="turfLocation" class="input-field" placeholder="e.g. HSR Layout"
                                required>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Price per Hour (₹)</label>
                            <input type="number" id="turfPrice" class="input-field" placeholder="e.g. 1500" required>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Sport Type</label>
                            <select id="turfSport" class="input-field" required>
                                <option value="" disabled selected>Select Sport</option>
                                <option value="Football">Football</option>
                                <option value="Cricket">Cricket</option>
                                <option value="Tennis">Tennis</option>
                                <option value="Multi-Sport">Multi-Sport</option>
                            </select>
                        </div>

                        <div class="pt-4 flex gap-3">
                            <button type="submit" id="saveBtn" class="btn-primary w-full">Save Turf</button>
                            <button type="button" id="cancelBtn"
                                class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-2 rounded-xl font-medium transition-all hidden">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass-card p-6 h-full w-max">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-heading text-2xl font-bold text-slate-800">Turf Directory</h2>
                        <span class="text-sm bg-primary/10 text-primary px-3 py-1 rounded-full font-medium"><span
                                id="turfCount">0</span> Total Turfs</span>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="py-3 px-4 font-semibold text-slate-700">Name</th>
                                    <th class="py-3 px-4 font-semibold text-slate-700">Location</th>
                                    <th class="py-3 px-4 font-semibold text-slate-700">Sport</th>
                                    <th class="py-3 px-4 font-semibold text-slate-700">Price/Hr</th>
                                    <th class="py-3 px-4 font-semibold text-slate-700 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="turfTableBody" class="divide-y divide-slate-100">
                            </tbody>
                        </table>
                        <div id="emptyState" class="hidden text-center py-10">
                            <div class="text-4xl mb-3">🏟️</div>
                            <h3 class="text-lg font-medium text-slate-800">No Turfs Found</h3>
                            <p class="text-slate-500">Start by adding a new turf using the form.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>
    <script src="js/crud.js"></script>


</body>

</html>
